# yaml-language-server: $schema=https://raw.githubusercontent.com/infn-epics/ibek-templates/refs/heads/main/schemas/ioc.schema.json
iocname: "electrex-plc"
asset: "https://baltig.infn.it/chaos-lnf-control/iocsh-dt-modbusdev"
iocprefix: "DT"
iocroot: "kilo"
template: "modbus-generic"
devgroup: io
devtype: modbus-generic
config_dir: "."
iocexit: true

connections:
  - name: electrex
    server: "192.168.146.107"
    port: 502
    slaves:
      - name: ELECTREX1
        slave_id: 1
        start_addr: 277
        length: 8
        poll_delay: 5000
        registers:
          - name: ced_nd_p
            offset: 0
            type: float
            desc: "Instantaneous Power"
            egu: KW
      - name: ELECTREX12
        slave_id: 1
        start_addr: 413
        length: 8
        poll_delay: 5000
        registers:
          - name: ced_nd_ea
            offset: 0
            type: int
            desc: "Average Energy"
            egu: KWh

      - name: ELECTREX2
        slave_id: 2
        start_addr: 277
        length: 8
        poll_delay: 5000
        registers:
          - name: ced_priv_p
            offset: 0
            type: float
            desc: "Instantaneous Power"
            egu: KW
      - name: ELECTREX22
        slave_id: 2
        start_addr: 413
        length: 8
        poll_delay: 5000
        registers:
          - name: ced_priv_ea
            offset: 0
            type: int
            desc: "Average Energy"
            egu: KWh

      - name: ELECTREX3
